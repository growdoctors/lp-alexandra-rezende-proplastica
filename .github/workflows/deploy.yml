name: Build and Deploy LP

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Create Cloudflare Pages project if needed
        run: bunx wrangler pages project create ${{ github.event.repository.name }} --production-branch=main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: bunx wrangler pages deploy dist/ --project-name=${{ github.event.repository.name }} --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Notify creative-post webhook
        run: |
          JOB_ID=$(cat lp-meta.json | python3 -c "import sys,json; print(json.load(sys.stdin)['jobId'])" 2>/dev/null || echo "")
          if [ -n "$JOB_ID" ]; then
            curl -s -X POST https://creative.growdoc.com.br/api/lp-webhook \
              -H "Content-Type: application/json" \
              -d "{\"jobId\":\"$JOB_ID\",\"pagesUrl\":\"https://${{ github.event.repository.name }}.pages.dev\"}"
          fi
